<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slides Reader</title>
  </head>
  <body>
    <div id="root">
      <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#edf2f8;color:#1b1f2a;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <section style="width:min(720px,100%);padding:28px;border:1px solid #d8e0ed;border-radius:8px;background:#fff;box-shadow:0 18px 45px rgb(27 31 42 / 10%);">
          <p style="margin:0 0 8px;color:#4662a8;font-weight:800;letter-spacing:.02em;text-transform:uppercase;">Slides Reader</p>
          <h1 style="margin:0 0 12px;font-size:28px;line-height:1.2;">正在启动前端...</h1>
          <p style="margin:0;color:#566172;">如果这里长时间不变，说明浏览器没有成功加载前端 JavaScript。请确认打开的是 start.py 输出的 Open 地址。</p>
        </section>
      </main>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var root = document.getElementById('root');
        if (!root || root.dataset.reactMounted === 'true') return;
        root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#fff5f5;color:#1b1f2a;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;"><section style="width:min(780px,100%);padding:28px;border:1px solid #efb4b4;border-radius:8px;background:#fff;"><p style="margin:0 0 8px;color:#b42318;font-weight:800;">Slides Reader 前端启动失败</p><h1 style="margin:0 0 12px;font-size:26px;">JavaScript 加载或执行出错</h1><pre style="white-space:pre-wrap;overflow:auto;margin:0;color:#7f1d1d;">' + String(event.message || '未知错误') + '</pre></section></main>';
      });
      window.addEventListener('unhandledrejection', function (event) {
        var root = document.getElementById('root');
        if (!root || root.dataset.reactMounted === 'true') return;
        var reason = event.reason && (event.reason.stack || event.reason.message) ? (event.reason.stack || event.reason.message) : event.reason;
        root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#fff5f5;color:#1b1f2a;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;"><section style="width:min(780px,100%);padding:28px;border:1px solid #efb4b4;border-radius:8px;background:#fff;"><p style="margin:0 0 8px;color:#b42318;font-weight:800;">Slides Reader 前端启动失败</p><h1 style="margin:0 0 12px;font-size:26px;">异步初始化出错</h1><pre style="white-space:pre-wrap;overflow:auto;margin:0;color:#7f1d1d;">' + String(reason || '未知错误') + '</pre></section></main>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
